services:
  # Backend API Service
  - type: web
    name: timeflow-backend
    runtime: node
    region: ohio
    plan: starter
    # Install pnpm from npm so the build does not depend on Corepack's cached ~/.local path (fixes
    # "Failed to switch pnpm to v10.x" on Render when packageManager points at a missing toolchain).
    buildCommand: npm install -g pnpm@9.15.9 && pnpm install --workspace-root && cd apps/backend && pnpm exec prisma generate && pnpm build
    startCommand: cd apps/backend && bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://api.time-flow.app/api/auth/google/callback
      - key: APP_BASE_URL
        value: https://time-flow.app
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MAX_TOKENS
        value: 4000
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: STRIPE_PRICE_FLOW_STATE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_FLOW_STATE_YEARLY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
