# Dependabot — npm updates for the TimeFlow monorepo (CASA SDLC evidence)
version: 2
updates:
  - package-ecosystem: npm
    directory: /timeflow
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
