name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 12 * * 1" # Weekly Monday 12:00 UTC
  workflow_dispatch:

defaults:
  run:
    working-directory: timeflow

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: timeflow/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Save audit report
        if: always()
        run: |
          mkdir -p docs/compliance/casa/self-scan-results
          pnpm audit --json > docs/compliance/casa/self-scan-results/pnpm-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-report
          path: timeflow/docs/compliance/casa/self-scan-results/pnpm-audit.json
          if-no-files-found: ignore

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p docs/compliance/casa/self-scan-results
          semgrep scan \
            --config p/default \
            --sarif \
            --sarif-output=docs/compliance/casa/self-scan-results/semgrep.sarif \
            --error \
            apps/backend/src apps/web/src packages
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: timeflow/docs/compliance/casa/self-scan-results/semgrep.sarif
          if-no-files-found: ignore
